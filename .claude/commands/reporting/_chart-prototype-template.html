<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHART_TITLE — VERSION</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #f5f7fa; color: #1a1a2e; }

    /* Version nav */
    .version-nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 12px;
      background: #1e1e2e; padding: 10px 24px;
      border-bottom: 1px solid #333;
    }
    .nav-label { font-size: 13px; font-weight: 600; color: #a0a0c0; white-space: nowrap; }
    .nav-links  { display: flex; gap: 6px; }
    .nav-link {
      padding: 4px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
      text-decoration: none; color: #a0a0c0; background: #2a2a3e;
      transition: background 0.15s;
    }
    .nav-link:hover  { background: #3a3a5e; color: #fff; }
    .nav-link.active { background: #4f46e5; color: #fff; }

    /* Page content */
    .page { padding: 32px; }
    header { margin-bottom: 28px; }
    header h1 { font-size: 20px; font-weight: 700; color: #111; }
    header p  { margin-top: 4px; font-size: 13px; color: #888; }

    .context-box {
      background: #fff8ed; border: 1px solid #fcd34d; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 24px;
      font-size: 13px; color: #78350f; line-height: 1.6;
    }

    .variants {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(520px, 1fr));
      gap: 24px;
    }
    .card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .card p  { font-size: 13px; color: #6b7280; margin-bottom: 16px; line-height: 1.5; }
    .tag {
      display: inline-block; margin-bottom: 10px;
      padding: 1px 8px; border-radius: 99px;
      font-size: 11px; font-weight: 600;
    }
    .chart-container { width: 100%; min-height: 300px; }
  </style>
</head>
<body>

<!-- VERSION NAV — update this block in all version files when a new version is added -->
<nav class="version-nav">
  <span class="nav-label">CHART_TITLE</span>
  <div class="nav-links">
    <a href="SLUG-v1.html" class="nav-link active">v1</a>
    <!-- <a href="SLUG-v2.html" class="nav-link">v2</a> -->
  </div>
</nav>

<div class="page">
  <header>
    <h1>CHART_TITLE</h1>
    <p>VERSION — open in browser to compare variants</p>
  </header>

  <!-- Optional: brief problem/context note -->
  <div class="context-box">
    <strong>Context:</strong> CONTEXT_DESCRIPTION
  </div>

  <div class="variants">

    <div class="card">
      <h2>Variant 1 — VARIANT_1_NAME</h2>
      <p>VARIANT_1_DESCRIPTION</p>
      <div class="chart-container" id="chart1"></div>
    </div>

    <div class="card">
      <h2>Variant 2 — VARIANT_2_NAME</h2>
      <p>VARIANT_2_DESCRIPTION</p>
      <div class="chart-container" id="chart2"></div>
    </div>

    <div class="card">
      <h2>Variant 3 — VARIANT_3_NAME</h2>
      <p>VARIANT_3_DESCRIPTION</p>
      <div class="chart-container" id="chart3"></div>
    </div>

  </div>
</div>

<script>
  const embedOpts = { renderer: "svg", actions: false };

  // ── Variant 1 ──────────────────────────────────────────────────────────────
  vegaEmbed("#chart1", VARIANT_1_SPEC, embedOpts);

  // ── Variant 2 ──────────────────────────────────────────────────────────────
  vegaEmbed("#chart2", VARIANT_2_SPEC, embedOpts);

  // ── Variant 3 ──────────────────────────────────────────────────────────────
  vegaEmbed("#chart3", VARIANT_3_SPEC, embedOpts);
</script>

</body>
</html>
